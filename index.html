<body>
  <div id="root"></div>

  <!-- Data (plain JS, populates window.SUVVY_DATA) -->
  <script src="src/data.js"></script>
  <script src="image-slot.js"></script>

  <!-- Icons and brand mark (JSX, registers window.Icons & window.SuvvyMark) -->
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/sections/ChannelMarks.jsx"></script>

  <!-- Sections (each registers a global component on window.*) -->
  <script type="text/babel" src="src/sections/Header.jsx"></script>
  <script type="text/babel" src="src/sections/Hero.jsx"></script>
  <script type="text/babel" src="src/sections/Benefits.jsx"></script>
  <script type="text/babel" src="src/sections/Solutions.jsx"></script>
  <script type="text/babel" src="src/sections/Channels.jsx"></script>
  <script type="text/babel" src="src/sections/KeyFunctions.jsx"></script>
  <script type="text/babel" src="src/sections/Capabilities.jsx"></script>
  <script type="text/babel" src="src/sections/AdditionalFunctions.jsx"></script>
  <script type="text/babel" src="src/sections/HowItWorks.jsx"></script>
  <script type="text/babel" src="src/sections/Scenarios.jsx"></script>
  <script type="text/babel" src="src/sections/Setup.jsx"></script>
  <script type="text/babel" src="src/sections/Cases.jsx"></script>
  <script type="text/babel" src="src/sections/Testimonial.jsx"></script>
  <script type="text/babel" src="src/sections/Testimonial2.jsx"></script>

  <script type="text/babel" src="src/sections/Contact.jsx"></script>
  <script type="text/babel" src="src/sections/Footer.jsx"></script>

  <!-- Root app — composes everything -->
  <script type="text/babel" src="src/App.jsx"></script>
</body>
</html>
